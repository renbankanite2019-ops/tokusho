<svg width="1600" height="900" viewBox="0 0 1600 900" xmlns="http://www.w3.org/2000/svg">
  <style>
    text { font-family: 'Yu Gothic UI','Yu Gothic','Hiragino Sans','Noto Sans JP','Meiryo',sans-serif; }
    .h     { font-size: 46px; font-weight: 700; fill: #1f2a26; }
    .pill  { font-size: 20px; font-weight: 700; fill: #5f7d6e; }
    .flabel{ font-size: 19px; font-weight: 600; fill: #6b7280; }
    .fval  { font-size: 21px; font-weight: 600; fill: #2b3a35; }
    .ptitle{ font-size: 27px; font-weight: 700; fill: #1f2a26; }
    .pmeta { font-size: 16px; fill: #9aa3a0; }
    .thtxt { font-size: 19px; font-weight: 700; fill: #ffffff; }
    .tdtxt { font-size: 19px; fill: #2b3a35; }
    .arrow { font-size: 18px; font-weight: 700; fill: #5f7d6e; }
  </style>

  <!-- background -->
  <rect width="1600" height="900" fill="#f4f6f5"/>

  <!-- headline (single line) -->
  <text x="800" y="108" text-anchor="middle" class="h">特商法表記ページを、入力するだけで作成</text>
  <rect x="640" y="128" width="320" height="5" rx="2.5" fill="#5f7d6e"/>

  <!-- ===== LEFT CARD: input form ===== -->
  <rect x="84" y="194" width="600" height="612" rx="18" fill="#000000" fill-opacity="0.05"/>
  <rect x="80" y="188" width="600" height="612" rx="18" fill="#ffffff" stroke="#e3e6e8" stroke-width="1.5"/>
  <rect x="112" y="218" width="92" height="38" rx="19" fill="#eef3f1"/>
  <text x="158" y="244" text-anchor="middle" class="pill">入力</text>

  <!-- row 1 -->
  <text x="116" y="300" class="flabel">事業者名</text>
  <rect x="114" y="312" width="532" height="50" rx="9" fill="#f6f8f7" stroke="#dfe3e1" stroke-width="1.5"/>
  <text x="134" y="345" class="fval">テスト商店</text>
  <!-- row 2 -->
  <text x="116" y="392" class="flabel">所在地</text>
  <rect x="114" y="404" width="532" height="50" rx="9" fill="#f6f8f7" stroke="#dfe3e1" stroke-width="1.5"/>
  <text x="134" y="437" class="fval">東京都渋谷区渋谷1-1-1</text>
  <!-- row 3 -->
  <text x="116" y="484" class="flabel">電話番号</text>
  <rect x="114" y="496" width="532" height="50" rx="9" fill="#f6f8f7" stroke="#dfe3e1" stroke-width="1.5"/>
  <text x="134" y="529" class="fval">03-1234-5678</text>
  <!-- row 4 -->
  <text x="116" y="576" class="flabel">メールアドレス</text>
  <rect x="114" y="588" width="532" height="50" rx="9" fill="#f6f8f7" stroke="#dfe3e1" stroke-width="1.5"/>
  <text x="134" y="621" class="fval">info@example.com</text>
  <!-- row 5 (select) -->
  <text x="116" y="668" class="flabel">返品条件</text>
  <rect x="114" y="680" width="532" height="50" rx="9" fill="#f6f8f7" stroke="#dfe3e1" stroke-width="1.5"/>
  <text x="134" y="713" class="fval">商品到着後8日以内・未開封</text>
  <path d="M612 700 l10 0 l-5 8 z" fill="#6b7280"/>

  <!-- ===== ARROW ===== -->
  <text x="800" y="470" text-anchor="middle" class="arrow">自動生成</text>
  <g>
    <rect x="716" y="487" width="120" height="16" rx="8" fill="#5f7d6e"/>
    <path d="M836 459 l40 36 l-40 36 z" fill="#5f7d6e"/>
  </g>

  <!-- ===== RIGHT CARD: generated page ===== -->
  <rect x="920" y="194" width="600" height="612" rx="18" fill="#000000" fill-opacity="0.05"/>
  <rect x="916" y="188" width="600" height="612" rx="18" fill="#ffffff" stroke="#e3e6e8" stroke-width="1.5"/>
  <rect x="948" y="218" width="140" height="38" rx="19" fill="#eef3f1"/>
  <text x="1018" y="244" text-anchor="middle" class="pill">公開ページ</text>

  <!-- page title -->
  <text x="948" y="312" class="ptitle">特定商取引法に基づく表記</text>
  <rect x="948" y="326" width="120" height="4" rx="2" fill="#5f7d6e"/>
  <text x="948" y="356" class="pmeta">最終更新日：2026年6月20日</text>

  <!-- table -->
  <g>
    <!-- row 1 -->
    <rect x="948" y="378" width="180" height="74" fill="#5f7d6e"/>
    <rect x="1128" y="378" width="356" height="74" fill="#ffffff" stroke="#e3e6e8" stroke-width="1"/>
    <text x="966" y="421" class="thtxt">販売業者</text>
    <text x="1148" y="421" class="tdtxt">テスト商店</text>
    <!-- row 2 -->
    <rect x="948" y="452" width="180" height="74" fill="#5f7d6e"/>
    <rect x="1128" y="452" width="356" height="74" fill="#ffffff" stroke="#e3e6e8" stroke-width="1"/>
    <text x="966" y="495" class="thtxt">所在地</text>
    <text x="1148" y="495" class="tdtxt">東京都渋谷区渋谷1-1-1</text>
    <!-- row 3 -->
    <rect x="948" y="526" width="180" height="74" fill="#5f7d6e"/>
    <rect x="1128" y="526" width="356" height="74" fill="#ffffff" stroke="#e3e6e8" stroke-width="1"/>
    <text x="966" y="569" class="thtxt">電話番号</text>
    <text x="1148" y="569" class="tdtxt">03-1234-5678</text>
    <!-- row 4 -->
    <rect x="948" y="600" width="180" height="74" fill="#5f7d6e"/>
    <rect x="1128" y="600" width="356" height="74" fill="#ffffff" stroke="#e3e6e8" stroke-width="1"/>
    <text x="966" y="643" class="thtxt">メール</text>
    <text x="1148" y="643" class="tdtxt">info@example.com</text>
    <!-- row 5 -->
    <rect x="948" y="674" width="180" height="74" fill="#5f7d6e"/>
    <rect x="1128" y="674" width="356" height="74" fill="#ffffff" stroke="#e3e6e8" stroke-width="1"/>
    <text x="966" y="717" class="thtxt">返品・交換</text>
    <text x="1148" y="717" class="tdtxt">商品到着後8日以内（未開封）</text>
  </g>
</svg>
